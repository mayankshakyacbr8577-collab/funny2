<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special For You 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

h1 {
    margin-top: 80px;
    font-size: 26px;
}

.btn {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    margin: 15px;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

#message {
    display: none;
    font-size: 22px;
    margin-top: 30px;
    padding: 10px;
}

/* hearts */
.heart {
    position: fixed;
    bottom: 0;
    font-size: 20px;
    animation: float 3s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<h1 id="question"></h1>

<button id="yesBtn" class="btn">Yes 💖</button>
<button id="noBtn" class="btn">No 😜</button>

<div id="message"></div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script>
// 👇 CUSTOMIZE HERE 👇
let yourName = "Mayank";
let herName = "Vutkey";

// text setup
document.getElementById("question").innerText = 
    `${herName}, do you like ${yourName}? 😅`;

const message = document.getElementById("message");
message.innerText = `Aww ${herName}! 😍 I knew it! 💕 Love you forever 💖`;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const music = document.getElementById("music");

let scale = 1;

// YES button
yesBtn.addEventListener("click", () => {
    message.style.display = "block";
    document.body.style.background = "#b2f7ef";
    music.play();

    // hearts
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
    }, 300);

    // confetti 🎆
    for(let i=0;i<100;i++){
        let conf = document.createElement("div");
        conf.style.position="fixed";
        conf.style.width="8px";
        conf.style.height="8px";
        conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
        conf.style.left = Math.random()*100+"vw";
        conf.style.top = "-10px";
        conf.style.opacity = 0.8;
        document.body.appendChild(conf);

        let fall = setInterval(()=>{
            let top = parseFloat(conf.style.top);
            conf.style.top = (top + 5) + "px";
            if(top > window.innerHeight){
                clearInterval(fall);
                conf.remove();
            }
        },20);
    }
});

// NO button
noBtn.addEventListener("click", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale -= 0.1;
    noBtn.style.transform = "scale(" + scale + ")";

    if(scale <= 0.4){
        noBtn.innerText = "मत दबाओ 😭";
    }
});
</script>

</body>
</html>
